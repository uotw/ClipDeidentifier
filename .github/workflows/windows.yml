name: Build & Sign Windows

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build-sign:
    runs-on: windows-latest
    environment: release
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      # package.json pins electron-builder v24 (v26 can't package the Mac app's
      # frameworks for this Electron version). Native azureSignOptions needs
      # v25+, and the Mac-only bug doesn't affect Windows packaging, so we use
      # v26 only here on the runner.
      - name: Use electron-builder v26 (Windows only)
        run: npm install --no-save electron-builder@26.8.1

      # electron-builder signs via native azureSignOptions: it auto-installs the
      # TrustedSigning PowerShell module and authenticates with Azure
      # EnvironmentCredential using the three AZURE_* env vars below.
      - name: Build & sign (x64)
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        # --publish never: build+sign only; don't auto-publish to GitHub Releases
        run: npm run dist-win64 -- --publish never

      - name: Upload installer
        uses: actions/upload-artifact@v4
        with:
          name: ClipDeidentifier-win-x64
          path: dist/*.exe
          if-no-files-found: error
