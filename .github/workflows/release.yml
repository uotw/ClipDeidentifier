name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write   # needed by the release job to create/update a GitHub Release

jobs:
  mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # --force pulls all darwin ffmpeg/ffprobe binaries so we can build BOTH
      # arm64 and x64 from this arm64 runner (they're optionalDependencies).
      - name: Install dependencies
        run: npm install --force

      - name: Build & sign (arm64 + x64)
        env:
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
        run: |
          npm run dist-macarm -- --publish never
          npm run dist-mac64 -- --publish never

      - name: Notarize & staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          for dmg in dist/*.dmg; do
            echo "::group::Notarizing $dmg"
            xcrun notarytool submit "$dmg" \
              --apple-id "$APPLE_ID" \
              --password "$APPLE_APP_SPECIFIC_PASSWORD" \
              --team-id "$APPLE_TEAM_ID" \
              --wait
            xcrun stapler staple "$dmg"
            xcrun stapler validate "$dmg"
            echo "::endgroup::"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: mac-dmgs
          path: dist/*.dmg
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      # package.json pins electron-builder v24 (v26 can't package the Mac app's
      # frameworks for this Electron version). Native azureSignOptions needs
      # v25+, and the Mac-only bug doesn't affect Windows packaging.
      - name: Use electron-builder v26 (Windows only)
        run: npm install --no-save electron-builder@26.8.1

      - name: Build & sign (x64)
        env:
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.AZURE_CLIENT_SECRET }}
        run: npm run dist-win64 -- --publish never

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe
          if-no-files-found: error

  release:
    needs: [mac, windows]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.dmg
            artifacts/**/*.exe
          fail_on_unmatched_files: true
          generate_release_notes: true
